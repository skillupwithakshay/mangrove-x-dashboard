name: Daily data refresh

on:
  schedule:
    # 06:00 UTC daily. Adjust to your team's timezone/needs.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write   # needed to commit refreshed data/*.json back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run X data pipeline
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python pipeline/fetch_x_data.py
        # If this step fails (bad creds, rate limit, X API error), the job
        # fails and no commit happens — data/x_latest.json is left untouched.

      - name: Run YouTube data pipeline
        # Uses one OAuth refresh token for both the YouTube Data API v3
        # (channel + video stats) and the YouTube Analytics API (watch time,
        # impressions, traffic sources, subscriber gains). continue-on-error
        # so a YouTube/token hiccup doesn't block the PyPI refresh or the
        # commit of X data below — on failure the script leaves
        # data/youtube_latest.json untouched (last good file stays deployed).
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python pipeline/fetch_youtube_data.py

      - name: Run Instagram data pipeline
        # Instagram Graph API (Business/Creator account): account insights,
        # follower demographics and per-post metrics. continue-on-error so an
        # IG/token issue (e.g. the 60-day user token expiring) doesn't block
        # the other refreshes or the commit below — on failure the last good
        # data/instagram_latest.json stays deployed. Use a Meta System User
        # token (never expires) for IG_ACCESS_TOKEN to avoid expiry entirely.
        continue-on-error: true
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
        run: python pipeline/fetch_instagram_data.py

      - name: Run TikTok data pipeline
        # TikTok Display API (Login Kit). Refreshes a ~24h access token from
        # the stored refresh token each run. continue-on-error so a TikTok/
        # token issue (e.g. the ~365-day refresh token expiring) doesn't block
        # the other refreshes or the commit — on failure the last good
        # data/tiktok_latest.json stays deployed.
        continue-on-error: true
        env:
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: python pipeline/fetch_tiktok_data.py

      - name: Set up Chrome (for LinkedIn scraper)
        # Only needed by the Selenium LinkedIn provider. continue-on-error so a
        # setup hiccup doesn't fail the run.
        continue-on-error: true
        uses: browser-actions/setup-chrome@v1

      - name: Run LinkedIn data pipeline
        # Selenium scraper for the company page. continue-on-error because
        # LinkedIn frequently blocks logins from datacenter/CI IPs with a
        # security checkpoint — when that happens this step just fails and the
        # last good data/linkedin_latest.json stays deployed. For reliable
        # results, run pipeline/fetch_linkedin_data.py locally. Swap to the
        # official API by setting LINKEDIN_SOURCE=api (see linkedin_api.py).
        continue-on-error: true
        env:
          LINKEDIN_SOURCE: ${{ vars.LINKEDIN_SOURCE || 'selenium' }}
          LINKEDIN_COMPANY: ${{ secrets.LINKEDIN_COMPANY }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
        run: |
          pip install -r pipeline/requirements-linkedin.txt
          python pipeline/fetch_linkedin_data.py

      - name: Run PyPI data pipeline
        # Reads the WordPress endpoint (matches mangrove.ai) with a pypistats
        # fallback; needs no secrets. continue-on-error so a temporary
        # WordPress/pypistats outage doesn't block the X refresh below — on
        # failure the script leaves data/pypi_latest.json untouched (last good).
        continue-on-error: true
        run: python pipeline/fetch_pypi_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add each data file only if it exists — the optional pipelines
          # (YouTube, PyPI) may not have produced a file yet (e.g. secrets not
          # set), and `git add` of a missing path would fail the whole step.
          for f in data/x_latest.json data/x_followers_history.json data/youtube_latest.json data/instagram_latest.json data/tiktok_latest.json data/linkedin_latest.json data/linkedin_followers_history.json data/pypi_latest.json; do
            [ -f "$f" ] && git add -f "$f"
          done
          git diff --cached --quiet && echo "No data changes to commit" && exit 0
          git commit -m "chore: daily data refresh [skip ci]"
          git push

      - name: Post summary to Slack
        # Only runs once SLACK_WEBHOOK_URL is added as a repo secret (Settings
        # -> Secrets and variables -> Actions). Until then this step is
        # skipped rather than failing the whole run, so Slack is optional
        # and doesn't block the data refresh above.
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Update this if the dashboard's deployed URL ever changes.
          DASHBOARD_URL: "https://mangrove-x-dashboard.vercel.app"
        run: python pipeline/post_slack_summary.py
        # A failed Slack post fails just this step, not the data refresh —
        # data/x_latest.json is already committed by the time this runs.
